name: Incident or bug
description: Track a bug, outage, failed command, or broken SOP step.
title: "[Incident] "
labels: ["bug-found", "needs-diagnosis"]
body:
  - type: textarea
    id: symptom
    attributes:
      label: What happened?
      description: Describe the failure, symptom, or broken step.
    validations:
      required: true
  - type: dropdown
    id: system
    attributes:
      label: System
      options:
        - main-vps
        - secondary-vps
        - openclaw
        - hermes
        - notion
        - github
        - other
    validations:
      required: true
  - type: input
    id: reported_by
    attributes:
      label: Reported by
      placeholder: Cody, Manus, Terry, Jack
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Short error message, log snippet, failed command, or observed result.
    validations:
      required: false
  - type: textarea
    id: fix
    attributes:
      label: Fix or next diagnostic step
    validations:
      required: false

