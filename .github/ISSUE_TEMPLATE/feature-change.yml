name: Feature change
description: Track a feature addition or change across agents or servers.
title: "[Feature] "
labels: ["feature-added", "needs-log"]
body:
  - type: input
    id: feature
    attributes:
      label: Feature
      placeholder: agent email reader, skill installer, routing check
    validations:
      required: true
  - type: input
    id: owner
    attributes:
      label: Added or changed by
      placeholder: Cody, Manus, OpenClaw Terry, Hermes
    validations:
      required: true
  - type: dropdown
    id: system
    attributes:
      label: System
      options:
        - main-vps
        - secondary-vps
        - openclaw
        - hermes
        - notion
        - github
        - other
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why this feature matters
      description: Business or operating reason.
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: What was tested and what result was observed?
    validations:
      required: false

